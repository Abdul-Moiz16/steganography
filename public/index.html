<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stego Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/public/style.css?v=2">
</head>
<body>
    <div class="shell">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <img class="brand-logo" src="/public/logo.png" alt="UM" width="32" height="32">
                <div class="brand-text">
                    <span class="brand-name">Stego</span>
                    <span class="brand-sub">Explorer</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a id="nav-runs" class="nav-link active" onclick="go('runs')">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 3h12M2 8h12M2 13h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                    Runs
                </a>
                <a id="nav-launch" class="nav-link" onclick="go('launch')">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 2l10 6-10 6V2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
                    Launch
                </a>
            </nav>
            <div class="sidebar-foot">
                <div class="sidebar-foot-label">Steganography Pipeline</div>
                <div class="sidebar-foot-sub">University of Malta &middot; M2</div>
            </div>
        </aside>
        <main class="content" id="main"></main>
    </div>

    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <span class="lightbox-close">&times;</span>
        <img id="lightbox-img" src="" alt="">
    </div>

    <script src="/public/charts.js?v=2"></script>
    <script src="/public/app.js?v=2"></script>
</body>
</html>
